<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CornerDay — Someone in Your Corner</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f9f9;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 16px}
    .card{background:#fff;border-radius:22px;padding:28px 24px;max-width:420px;width:100%;box-shadow:0 2px 24px rgba(15,110,110,.09)}
    .logo{font-size:12px;font-weight:700;color:#0F6E6E;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:24px;text-align:center;opacity:.7}
    .streak-box{background:#e6f7f7;border-radius:16px;padding:22px 16px;text-align:center;margin-bottom:20px}
    .streak-num{font-size:56px;font-weight:800;color:#0F6E6E;line-height:1}
    .streak-unit{font-size:18px;font-weight:700;color:#0F6E6E;margin-top:2px}
    .streak-sub{font-size:14px;color:#5a9090;margin-top:6px;font-weight:500}
    .streak-detail{font-size:12px;color:#7ab0b0;margin-top:4px}
    .section{background:#f9fdfd;border-radius:14px;padding:16px;margin-bottom:12px}
    .section-label{font-size:11px;font-weight:700;color:#0F6E6E;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
    .mood-row{display:flex;align-items:center;gap:10px}
    .mood-emoji{font-size:28px;line-height:1}
    .mood-text{font-size:15px;font-weight:700;color:#1a2e2e}
    .mood-sub{font-size:12px;color:#5a7a7a;margin-top:2px}
    .stat-row{display:flex;gap:10px;margin-bottom:4px}
    .stat-box{flex:1;background:#fff;border-radius:10px;padding:12px 10px;text-align:center;border:1px solid #e0eded}
    .stat-val{font-size:22px;font-weight:800;color:#0F6E6E;line-height:1}
    .stat-lbl{font-size:11px;color:#5a7a7a;margin-top:3px;font-weight:600}
    .milestone-sub{font-size:13px;color:#5a7a7a;margin-top:6px}
    .urge-row{display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid #e0eded}
    .urge-val{font-size:20px;font-weight:800;color:#0F6E6E}
    .urge-lbl{font-size:13px;color:#5a7a7a}
    .progress-bar-track{background:#ddd;border-radius:4px;height:8px;overflow:hidden;margin:10px 0 6px}
    .progress-bar-fill{background:linear-gradient(90deg,#0F6E6E,#1a9a9a);height:100%;border-radius:4px;transition:width .4s}
    .progress-label{font-size:13px;color:#5a7a7a}
    .recovery-row{display:flex;gap:10px;margin-bottom:10px}
    .recovery-box{flex:1;background:#fff;border-radius:10px;padding:12px 10px;text-align:center;border:1px solid #e0eded}
    .recovery-val{font-size:18px;font-weight:800;color:#1a2e2e;line-height:1}
    .recovery-val.green{color:#0F6E6E}
    .recovery-lbl{font-size:11px;color:#5a7a7a;margin-top:3px;font-weight:600}
    .clean-start{display:flex;align-items:center;gap:10px}
    .clean-start-emoji{font-size:28px}
    .clean-start-text{font-size:14px;font-weight:600;color:#1a2e2e}
    .clean-start-sub{font-size:12px;color:#5a7a7a;margin-top:2px}
    .savings-highlight{background:#e6f7f7;border-radius:10px;padding:12px 14px;margin-top:8px;display:flex;align-items:center;gap:10px}
    .savings-emoji{font-size:22px}
    .savings-text{font-size:14px;font-weight:700;color:#0F6E6E}
    .savings-sub{font-size:12px;color:#5a9090;margin-top:1px}
    h2{font-size:17px;font-weight:700;color:#1a2e2e;margin-bottom:6px}
    p{font-size:14px;color:#5a7a7a;line-height:1.6;margin-bottom:20px}
    .divider{height:1px;background:#e0eded;margin:20px 0}
    label{font-size:13px;font-weight:600;color:#1a2e2e;display:block;margin-bottom:8px}
    textarea{width:100%;border:1.5px solid #c8e4e4;border-radius:12px;padding:12px 14px;font-size:15px;font-family:inherit;resize:none;outline:none;color:#1a2e2e;background:#fff;transition:border-color .2s}
    textarea:focus{border-color:#0F6E6E}
    button{width:100%;background:#0F6E6E;color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:700;margin-top:12px;cursor:pointer;font-family:inherit;transition:opacity .15s}
    button:hover{opacity:.85}
    button:disabled{opacity:.5;cursor:default}
    .sent{background:#e6f7f7;border-radius:14px;padding:20px;text-align:center}
    .sent-title{font-size:17px;font-weight:700;color:#0F6E6E;margin-bottom:4px}
    .sent-sub{font-size:13px;color:#5a9090}
    .error{background:#fff0f0;border-radius:14px;padding:16px;text-align:center;color:#c0392b;font-size:14px}
    .notify-section{background:#f9fdfd;border-radius:14px;padding:18px;margin-top:16px;border:1px solid #e0eded}
    .notify-title{font-size:14px;font-weight:700;color:#1a2e2e;margin-bottom:4px}
    .notify-sub{font-size:13px;color:#5a7a7a;line-height:1.5;margin-bottom:14px}
    .notify-input{width:100%;border:1.5px solid #c8e4e4;border-radius:10px;padding:11px 13px;font-size:15px;font-family:inherit;outline:none;color:#1a2e2e;background:#fff;box-sizing:border-box;transition:border-color .2s}
    .notify-input:focus{border-color:#0F6E6E}
    .notify-btn{width:100%;background:#0F6E6E;color:#fff;border:none;border-radius:10px;padding:12px;font-size:15px;font-weight:700;margin-top:10px;cursor:pointer;font-family:inherit;transition:opacity .15s}
    .notify-btn:hover{opacity:.85}
    .notify-btn:disabled{opacity:.5;cursor:default}
    .notify-subscribed{display:flex;align-items:center;gap:8px;font-size:13px;color:#0F6E6E;font-weight:600}
    .notify-update{font-size:12px;color:#5a9090;margin-top:6px;cursor:pointer;text-decoration:underline;display:inline-block}
    .notify-err{font-size:12px;color:#c0392b;margin-top:6px}
    footer{font-size:12px;color:#a8c0c0;text-align:center;margin-top:20px}
    .private-banner{background:#fff8e6;border:1px solid #f0d080;border-radius:10px;padding:10px 14px;font-size:12px;color:#7a6020;margin-bottom:16px;line-height:1.5}
    .spinner{width:32px;height:32px;border:3px solid #e6f7f7;border-top-color:#0F6E6E;border-radius:50%;animation:spin .8s linear infinite;margin:20px auto;display:block}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="logo">CornerDay</div>
    <div class="spinner"></div>
  </div>
  <footer>CornerDay &middot; "The day you turn it around starts today"</footer>
  <script>
    const API = 'https://cdgsiotlocurwnqxebrh.supabase.co/functions/v1/partner-view';
    const token = new URLSearchParams(location.search).get('t') || '';
    const card = document.getElementById('card');

    const CURRENCY_SYMBOLS = { USD: '$', EUR: '€', GBP: '£', PLN: 'zł', AUD: 'A$', CAD: 'C$' };
    const currSym = c => CURRENCY_SYMBOLS[c] || c || '$';

    const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

    function formatStreak(ms) {
      const totalMins  = Math.floor(ms / 60000);
      const totalHours = Math.floor(ms / 3600000);
      const totalDays  = Math.floor(ms / 86400000);

      if (totalMins < 1)   return { primary: '1', unit: 'minute', detail: null };
      if (totalHours < 1)  return { primary: String(totalMins), unit: totalMins === 1 ? 'minute' : 'minutes', detail: null };

      const mins = totalMins % 60;
      if (totalDays < 1) {
        return { primary: String(totalHours), unit: totalHours === 1 ? 'hour' : 'hours', detail: mins > 0 ? mins + (mins === 1 ? ' min' : ' mins') : null };
      }

      const hours = totalHours % 24;
      if (totalDays < 7) {
        return { primary: String(totalDays), unit: totalDays === 1 ? 'day' : 'days', detail: hours > 0 ? hours + (hours === 1 ? ' hour' : ' hours') : null };
      }

      const weeks = Math.floor(totalDays / 7);
      const remDays = totalDays % 7;
      if (totalDays < 30) {
        return { primary: String(weeks), unit: weeks === 1 ? 'week' : 'weeks', detail: remDays > 0 ? remDays + (remDays === 1 ? ' day' : ' days') : null };
      }

      const months = Math.floor(totalDays / 30);
      const remDays2 = totalDays % 30;
      if (totalDays < 365) {
        return { primary: String(months), unit: months === 1 ? 'month' : 'months', detail: remDays2 > 0 ? remDays2 + (remDays2 === 1 ? ' day' : ' days') : null };
      }

      const years = Math.floor(totalDays / 365);
      const remMonths = Math.floor((totalDays % 365) / 30);
      return { primary: String(years), unit: years === 1 ? 'year' : 'years', detail: remMonths > 0 ? remMonths + (remMonths === 1 ? ' month' : ' months') : null };
    }

    function moodLabel(avg) {
      if (avg === null) return { emoji: '—', text: 'No check-ins this week' };
      if (avg >= 4.2) return { emoji: '😄', text: 'Great week' };
      if (avg >= 3.5) return { emoji: '😊', text: 'Good week' };
      if (avg >= 2.5) return { emoji: '😐', text: 'Getting through it' };
      if (avg >= 1.5) return { emoji: '😟', text: 'Difficult week' };
      return { emoji: '😔', text: 'Tough week' };
    }

    function buildMoodSection(moodAvg, moodCheckins) {
      const m = moodLabel(moodAvg);
      return `<div class="section">
        <div class="section-label">Mood this week</div>
        <div class="mood-row">
          <div class="mood-emoji">${m.emoji}</div>
          <div>
            <div class="mood-text">${esc(m.text)}</div>
            <div class="mood-sub">${moodCheckins} check-in${moodCheckins !== 1 ? 's' : ''} this week</div>
          </div>
        </div>
      </div>`;
    }

    function buildMilestonesSection(count, latestLabel, urgesResisted) {
      const urgeHtml = (typeof urgesResisted === 'number')
        ? `<div class="urge-row">
            <div class="urge-val">${esc(String(urgesResisted))}</div>
            <div class="urge-lbl">urge${urgesResisted !== 1 ? 's' : ''} resisted this week 💪</div>
           </div>`
        : '';
      return `<div class="section">
        <div class="section-label">Milestones &amp; Resilience</div>
        <div class="stat-row">
          <div class="stat-box">
            <div class="stat-val">${esc(String(count))}</div>
            <div class="stat-lbl">milestone${count !== 1 ? 's' : ''} earned</div>
          </div>
        </div>
        ${latestLabel ? `<div class="milestone-sub">Most recent: <strong>${esc(latestLabel)}</strong></div>` : ''}
        ${urgeHtml}
      </div>`;
    }

    function buildRecoverySection(recoveryPct, totalLost, totalPaid, moneySaved, currency) {
      const sym = currSym(currency);
      let html = `<div class="section"><div class="section-label">Financial Recovery</div>`;

      if (totalLost > 0) {
        // Has tracked debt — show amounts + progress bar
        const owed = Math.max(0, totalLost - totalPaid);
        html += `<div class="recovery-row">
          <div class="recovery-box">
            <div class="recovery-val">${sym}${Number(totalLost).toLocaleString()}</div>
            <div class="recovery-lbl">total tracked</div>
          </div>
          <div class="recovery-box">
            <div class="recovery-val green">${sym}${Number(totalPaid).toLocaleString()}</div>
            <div class="recovery-lbl">paid back</div>
          </div>
          <div class="recovery-box">
            <div class="recovery-val">${sym}${Number(owed).toLocaleString()}</div>
            <div class="recovery-lbl">still owed</div>
          </div>
        </div>`;
        if (recoveryPct !== null) {
          html += `<div class="progress-bar-track"><div class="progress-bar-fill" style="width:${recoveryPct}%"></div></div>
          <div class="progress-label">${recoveryPct}% of debt paid back</div>`;
        }
      } else {
        // No tracked debt
        html += `<div class="clean-start">
          <div class="clean-start-emoji">🎉</div>
          <div>
            <div class="clean-start-text">No gambling debt tracked</div>
            <div class="clean-start-sub">They're starting clean — no debt to pay back.</div>
          </div>
        </div>`;
      }

      // Estimated money saved (shown whenever weekly_bet is set)
      if (moneySaved > 0) {
        html += `<div class="savings-highlight">
          <div class="savings-emoji">💰</div>
          <div>
            <div class="savings-text">~${sym}${Number(moneySaved).toLocaleString()} saved by not gambling</div>
            <div class="savings-sub">Estimated based on their usual weekly spend</div>
          </div>
        </div>`;
      }

      html += `</div>`;
      return html;
    }

    async function send() {
      const ta = document.getElementById('msg');
      const btn = document.getElementById('btn');
      const msg = ta.value.trim().slice(0, 200);
      if (!msg) return;
      btn.disabled = true; btn.textContent = 'Sending…';
      try {
        const r = await fetch(API + '?t=' + encodeURIComponent(token), {
          method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({message: msg})
        });
        if (r.ok) {
          document.getElementById('form-area').outerHTML =
            '<div class="sent"><div class="sent-title">&#x1F499; Sent!</div><div class="sent-sub">They\'ll see your message next time they open CornerDay.</div></div>';
        } else { btn.disabled = false; btn.textContent = 'Send 💙'; alert('Something went wrong.'); }
      } catch { btn.disabled = false; btn.textContent = 'Send 💙'; alert('Could not send. Check your connection.'); }
    }

    async function subscribe() {
      const inp = document.getElementById('notify-email');
      const btn = document.getElementById('notify-btn');
      const err = document.getElementById('notify-err');
      const email = inp.value.trim().toLowerCase();
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        err.textContent = 'Please enter a valid email address.'; return;
      }
      err.textContent = '';
      btn.disabled = true; btn.textContent = 'Saving…';
      try {
        const r = await fetch(API + '?t=' + encodeURIComponent(token), {
          method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({email})
        });
        if (r.ok) {
          document.getElementById('notify-section').innerHTML =
            '<div class="notify-subscribed">✅ You\'re subscribed to notifications</div>' +
            '<div class="notify-update" onclick="showNotifyForm()">Update email address</div>';
        } else {
          btn.disabled = false; btn.textContent = 'Subscribe';
          err.textContent = 'Something went wrong. Please try again.';
        }
      } catch {
        btn.disabled = false; btn.textContent = 'Subscribe';
        err.textContent = 'Could not save. Check your connection.';
      }
    }

    function showNotifyForm() {
      document.getElementById('notify-section').innerHTML = notifyFormHtml(false);
    }

    function notifyFormHtml(subscribed) {
      if (subscribed) {
        return '<div class="notify-subscribed">✅ You\'re subscribed to notifications</div>' +
               '<div class="notify-update" onclick="showNotifyForm()">Update email address</div>';
      }
      return '<div class="notify-title">Get notified by email</div>' +
             '<div class="notify-sub">Receive an email when they\'re struggling, hit a milestone, or reset their streak — based on what they\'ve chosen to share.</div>' +
             '<input id="notify-email" class="notify-input" type="email" placeholder="your@email.com" />' +
             '<div id="notify-err" class="notify-err"></div>' +
             '<button id="notify-btn" class="notify-btn" onclick="subscribe()">Subscribe</button>';
    }

    (async () => {
      if (!token) { card.innerHTML = '<div class="logo">CornerDay</div><div class="error">Invalid link.</div>'; return; }
      try {
        const r = await fetch(API + '?t=' + encodeURIComponent(token));
        if (r.status === 404) { card.innerHTML = '<div class="logo">CornerDay</div><div class="error">This link is invalid or has been revoked.</div>'; return; }
        if (r.status === 410) { card.innerHTML = '<div class="logo">CornerDay</div><div class="error">This link has expired. Ask them to generate a new one in the app.</div>'; return; }
        const data = await r.json();
        const {
          streakMs, displayName: n,
          moodAvg, moodCheckins,
          milestonesEarned, latestMilestoneLabel, urgesResisted,
          recoveryPct, totalLost, totalPaid, moneySaved, currency,
          notifyEnabled, hasSubscriberEmail,
        } = data;
        const fmt = formatStreak(streakMs || 0);
        const name = n || 'someone you care about';
        const streakLabel = fmt.primary + ' ' + fmt.unit + (fmt.detail ? ' ' + fmt.detail : '');

        let extraSections = '';
        if (moodAvg !== undefined) extraSections += buildMoodSection(moodAvg, moodCheckins ?? 0);
        if (milestonesEarned !== undefined) extraSections += buildMilestonesSection(milestonesEarned, latestMilestoneLabel ?? null, urgesResisted);
        if (recoveryPct !== undefined || totalLost !== undefined || moneySaved !== undefined) {
          extraSections += buildRecoverySection(
            recoveryPct ?? null,
            totalLost ?? 0,
            totalPaid ?? 0,
            moneySaved ?? 0,
            currency ?? 'USD'
          );
        }

        const notifyHtml = notifyEnabled
          ? '<div class="notify-section" id="notify-section">' + notifyFormHtml(!!hasSubscriberEmail) + '</div>'
          : '';

        card.innerHTML =
          '<div class="logo">CornerDay</div>' +
          '<div class="private-banner">🔒 This link was shared with you personally. Please don\'t forward it — anyone with the URL can view this page.</div>' +
          '<div class="streak-box">' +
            '<div class="streak-num">' + esc(fmt.primary) + '</div>' +
            '<div class="streak-unit">' + esc(fmt.unit) + '</div>' +
            (fmt.detail ? '<div class="streak-detail">' + esc(fmt.detail) + '</div>' : '') +
            '<div class="streak-sub">clean &#x1F389;</div>' +
          '</div>' +
          '<h2>' + esc(name) + ' is on a ' + esc(streakLabel) + ' streak</h2>' +
          '<p>They\'re working hard on their recovery. Send them a short message of support &mdash; it\'ll appear in the app next time they open it.</p>' +
          extraSections +
          notifyHtml +
          '<div class="divider"></div>' +
          '<div id="form-area"><label>Send encouragement</label>' +
          '<textarea id="msg" rows="3" maxlength="200" placeholder="Write something kind… (max 200 characters)"></textarea>' +
          '<button id="btn" onclick="send()">Send &#x1F499;</button></div>';
      } catch { card.innerHTML = '<div class="logo">CornerDay</div><div class="error">Could not load. Please try again.</div>'; }
    })();
  </script>
</body>
</html>
