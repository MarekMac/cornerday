<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CornerDay — Someone in Your Corner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal-dark:  #0F6E6E;
      --teal-mid:   #1a9a9a;
      --teal-light: #a8d8d0;
      --accent:     #e6f7f7;
      --text:       #1a2e2e;
      --muted:      #5a7a7a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5fbfb;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      line-height: 1.6;
    }

    /* ── Header ── */
    .page-header {
      background: linear-gradient(150deg, #0a4f4f 0%, #0F6E6E 55%, #1a9a9a 100%);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .header-brand img {
      width: 34px;
      height: 34px;
      border-radius: 9px;
    }

    .header-brand-name {
      font-size: 17px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.2px;
    }

    .header-badge {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.75);
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.26);
      border-radius: 20px;
      padding: 3px 11px;
      margin-left: 2px;
    }

    /* ── Main ── */
    main {
      flex: 1;
      padding: 32px 16px 52px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 28px 24px;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 4px 32px rgba(15,110,110,0.10);
    }

    /* ── Desktop wider single column ── */
    @media (min-width: 600px) {
      main { padding: 40px 32px 64px; }

      .card {
        max-width: 900px;
        padding: 40px 48px;
      }
    }

    /* ── Logo label (shows in error states) ── */
    .logo {
      font-size: 10px;
      font-weight: 700;
      color: var(--teal-dark);
      text-transform: uppercase;
      letter-spacing: 1.4px;
      margin-bottom: 20px;
      text-align: center;
      opacity: 0.55;
    }

    /* ── Streak box ── */
    .streak-box {
      background: linear-gradient(150deg, #0a4f4f 0%, #0F6E6E 55%, #1a9a9a 100%);
      border-radius: 20px;
      padding: 28px 16px 24px;
      text-align: center;
      margin-bottom: 20px;
    }

    .streak-row {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .streak-num {
      font-size: 68px;
      font-weight: 900;
      color: #fff;
      line-height: 1;
      letter-spacing: -2px;
    }

    .streak-unit {
      font-size: 20px;
      font-weight: 700;
      color: rgba(255,255,255,0.88);
    }

    .streak-detail {
      font-size: 20px;
      font-weight: 700;
      color: rgba(255,255,255,0.6);
    }

    .streak-sub {
      font-size: 14px;
      color: rgba(255,255,255,0.62);
      margin-top: 10px;
      font-weight: 500;
    }

    /* ── Card typography ── */
    h2 {
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.35;
    }

    p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.65;
      margin-bottom: 20px;
    }

    .divider {
      height: 1px;
      background: var(--accent);
      margin: 24px 0;
    }

    /* ── Data sections ── */
    .section {
      background: var(--accent);
      border-radius: 16px;
      padding: 18px 16px;
      margin-bottom: 12px;
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.4px;
      color: var(--teal-dark);
      margin-bottom: 12px;
    }

    /* ── Mood ── */
    .mood-row { display: flex; align-items: center; gap: 12px; }
    .mood-emoji { font-size: 32px; line-height: 1; }
    .mood-text { font-size: 15px; font-weight: 700; color: var(--text); }
    .mood-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }

    /* ── Stats ── */
    .stat-row { display: flex; gap: 8px; margin-bottom: 4px; }

    .stat-box {
      flex: 1;
      background: #fff;
      border-radius: 12px;
      padding: 14px 10px;
      text-align: center;
    }

    .stat-val {
      font-size: 26px;
      font-weight: 800;
      color: var(--teal-dark);
      line-height: 1;
    }

    .stat-lbl {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .milestone-sub { font-size: 13px; color: var(--muted); margin-top: 8px; }

    .urge-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(15,110,110,0.12);
    }

    .urge-val { font-size: 22px; font-weight: 800; color: var(--teal-dark); }
    .urge-lbl { font-size: 13px; color: var(--muted); }

    /* ── Recovery ── */
    .progress-bar-track {
      background: rgba(15,110,110,0.12);
      border-radius: 6px;
      height: 8px;
      overflow: hidden;
      margin: 12px 0 6px;
    }

    .progress-bar-fill {
      background: linear-gradient(90deg, var(--teal-dark), var(--teal-mid));
      height: 100%;
      border-radius: 6px;
      transition: width .4s;
    }

    .progress-label { font-size: 12px; color: var(--muted); }

    .recovery-row { display: flex; gap: 8px; margin-bottom: 10px; }

    .recovery-box {
      flex: 1;
      background: #fff;
      border-radius: 12px;
      padding: 12px 8px;
      text-align: center;
    }

    .recovery-val { font-size: 18px; font-weight: 800; color: var(--text); line-height: 1; }
    .recovery-val.green { color: var(--teal-dark); }
    .recovery-lbl {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .clean-start { display: flex; align-items: center; gap: 12px; }
    .clean-start-emoji { font-size: 28px; }
    .clean-start-text { font-size: 15px; font-weight: 700; color: var(--text); }
    .clean-start-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }

    .savings-highlight {
      background: #fff;
      border-radius: 12px;
      padding: 13px 14px;
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1.5px solid rgba(15,110,110,0.14);
    }

    .savings-emoji { font-size: 22px; }
    .savings-text { font-size: 14px; font-weight: 700; color: var(--teal-dark); }
    .savings-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* ── Encourage panel header ── */
    .encourage-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
    }

    .encourage-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--teal-dark), var(--teal-mid));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .encourage-title {
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 3px;
    }

    .encourage-sub {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.45;
    }

    /* ── Message form ── */
    label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      display: block;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      border: 1.5px solid var(--teal-light);
      border-radius: 14px;
      padding: 13px 15px;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      outline: none;
      color: var(--text);
      background: #fff;
      transition: border-color .2s;
      line-height: 1.5;
    }

    textarea:focus { border-color: var(--teal-dark); }

    button {
      width: 100%;
      background: linear-gradient(135deg, var(--teal-dark), var(--teal-mid));
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 15px;
      font-size: 16px;
      font-weight: 700;
      margin-top: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: opacity .15s;
      letter-spacing: 0.2px;
    }

    button:hover { opacity: .88; }
    button:disabled { opacity: .42; cursor: default; }

    /* ── Sent / Error ── */
    .sent {
      background: var(--accent);
      border-radius: 16px;
      padding: 28px 20px;
      text-align: center;
    }

    .sent-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--teal-dark);
      margin-bottom: 6px;
    }

    .sent-sub { font-size: 14px; color: var(--muted); }

    .error {
      background: #fff0f0;
      border: 1px solid #f5c6c6;
      border-radius: 16px;
      padding: 18px;
      text-align: center;
      color: #c0392b;
      font-size: 14px;
      font-weight: 600;
      line-height: 1.5;
    }

    /* ── Notify section ── */
    .notify-section {
      background: var(--accent);
      border-radius: 16px;
      padding: 20px;
      margin-top: 12px;
    }

    .notify-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 6px; }

    .notify-sub {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .notify-input {
      width: 100%;
      border: 1.5px solid var(--teal-light);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      color: var(--text);
      background: #fff;
      box-sizing: border-box;
      transition: border-color .2s;
    }

    .notify-input:focus { border-color: var(--teal-dark); }

    .notify-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--teal-dark), var(--teal-mid));
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 13px;
      font-size: 15px;
      font-weight: 700;
      margin-top: 10px;
      cursor: pointer;
      font-family: inherit;
      transition: opacity .15s;
    }

    .notify-btn:hover { opacity: .88; }
    .notify-btn:disabled { opacity: .42; cursor: default; }

    .notify-subscribed {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--teal-dark);
      font-weight: 700;
    }

    .notify-update {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
      cursor: pointer;
      text-decoration: underline;
      display: inline-block;
    }

    .notify-err { font-size: 12px; color: #c0392b; margin-top: 6px; }

    /* ── Private banner ── */
    .private-banner {
      background: rgba(15,110,110,0.06);
      border: 1px solid rgba(15,110,110,0.14);
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 20px;
      line-height: 1.55;
    }

    /* ── Spinner ── */
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--accent);
      border-top-color: var(--teal-dark);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 28px auto;
      display: block;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    footer {
      background: #081e1e;
      color: rgba(255,255,255,0.4);
      padding: 28px 24px;
      text-align: center;
      font-size: 12px;
    }

    .footer-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .footer-brand img {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      opacity: 0.85;
    }

    .footer-brand span {
      font-size: 14px;
      font-weight: 800;
      color: #fff;
    }

    footer a { color: var(--teal-light); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <header class="page-header">
    <a href="https://cornerday.app" class="header-brand">
      <img src="https://cdgsiotlocurwnqxebrh.supabase.co/storage/v1/object/public/pages/brand/icon.png" alt="CornerDay">
      <span class="header-brand-name">CornerDay</span>
    </a>
    <span class="header-badge">Supporter View</span>
  </header>

  <main>
    <div class="card" id="card">
      <div class="spinner"></div>
    </div>
  </main>

  <footer>
    <div class="footer-brand">
      <img src="https://cdgsiotlocurwnqxebrh.supabase.co/storage/v1/object/public/pages/brand/icon.png" alt="CornerDay">
      <span>CornerDay</span>
    </div>
    <div>© 2026 CornerDay &middot; <a href="https://cornerday.app/privacy">Privacy Policy</a></div>
  </footer>

  <script>
    const API = 'https://cdgsiotlocurwnqxebrh.supabase.co/functions/v1/partner-view';
    const ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkZ3Npb3Rsb2N1cnducXhlYnJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MTU0NzgsImV4cCI6MjA5NTk5MTQ3OH0.iNGaxKqZWmZy8ykEYeGWDF6mn0sDqajg5ueRxLV72kI';
    const AUTH = { 'Authorization': 'Bearer ' + ANON };
    const token = new URLSearchParams(location.search).get('t') || '';
    const card = document.getElementById('card');

    const CURRENCY_SYMBOLS = { USD: '$', EUR: '€', GBP: '£', PLN: 'zł', AUD: 'A$', CAD: 'C$' };
    const currSym = c => CURRENCY_SYMBOLS[c] || c || '$';

    const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

    function formatStreak(ms) {
      const totalMins  = Math.floor(ms / 60000);
      const totalHours = Math.floor(ms / 3600000);
      const totalDays  = Math.floor(ms / 86400000);

      if (totalMins < 1)   return { primary: '—', unit: 'just getting started', detail: null };
      if (totalHours < 1)  return { primary: String(totalMins), unit: totalMins === 1 ? 'minute' : 'minutes', detail: null };

      const mins = totalMins % 60;
      if (totalDays < 1) {
        return { primary: String(totalHours), unit: totalHours === 1 ? 'hour' : 'hours', detail: mins > 0 ? mins + (mins === 1 ? ' min' : ' mins') : null };
      }

      const hours = totalHours % 24;
      if (totalDays < 7) {
        return { primary: String(totalDays), unit: totalDays === 1 ? 'day' : 'days', detail: hours > 0 ? hours + (hours === 1 ? ' hour' : ' hours') : null };
      }

      const weeks = Math.floor(totalDays / 7);
      const remDays = totalDays % 7;
      if (totalDays < 30) {
        return { primary: String(weeks), unit: weeks === 1 ? 'week' : 'weeks', detail: remDays > 0 ? remDays + (remDays === 1 ? ' day' : ' days') : null };
      }

      const months = Math.floor(totalDays / 30);
      const remDays2 = totalDays % 30;
      if (totalDays < 365) {
        return { primary: String(months), unit: months === 1 ? 'month' : 'months', detail: remDays2 > 0 ? remDays2 + (remDays2 === 1 ? ' day' : ' days') : null };
      }

      const years = Math.floor(totalDays / 365);
      const remMonths = Math.floor((totalDays % 365) / 30);
      return { primary: String(years), unit: years === 1 ? 'year' : 'years', detail: remMonths > 0 ? remMonths + (remMonths === 1 ? ' month' : ' months') : null };
    }

    function moodLabel(avg) {
      if (avg === null) return { emoji: '—', text: 'No check-ins this week' };
      if (avg >= 4.2) return { emoji: '😄', text: 'Great week' };
      if (avg >= 3.5) return { emoji: '😊', text: 'Good week' };
      if (avg >= 2.5) return { emoji: '😐', text: 'Getting through it' };
      if (avg >= 1.5) return { emoji: '😟', text: 'Difficult week' };
      return { emoji: '😔', text: 'Tough week' };
    }

    function buildMoodSection(moodAvg, moodCheckins) {
      const m = moodLabel(moodAvg);
      return `<div class="section">
        <div class="section-label">Mood this week</div>
        <div class="mood-row">
          <div class="mood-emoji">${m.emoji}</div>
          <div>
            <div class="mood-text">${esc(m.text)}</div>
            <div class="mood-sub">${moodCheckins} check-in${moodCheckins !== 1 ? 's' : ''} this week</div>
          </div>
        </div>
      </div>`;
    }

    function buildMilestonesSection(count, latestLabel, urgesResisted) {
      const urgeHtml = (typeof urgesResisted === 'number')
        ? `<div class="urge-row">
            <div class="urge-val">${esc(String(urgesResisted))}</div>
            <div class="urge-lbl">urge${urgesResisted !== 1 ? 's' : ''} resisted this week 💪</div>
           </div>`
        : '';
      return `<div class="section">
        <div class="section-label">Milestones &amp; Resilience</div>
        <div class="stat-row">
          <div class="stat-box">
            <div class="stat-val">${esc(String(count))}</div>
            <div class="stat-lbl">milestone${count !== 1 ? 's' : ''} earned</div>
          </div>
        </div>
        ${latestLabel ? `<div class="milestone-sub">Most recent: <strong>${esc(latestLabel)}</strong></div>` : ''}
        ${urgeHtml}
      </div>`;
    }

    function buildRecoverySection(recoveryPct, totalLost, totalPaid, moneySaved, currency) {
      const sym = currSym(currency);
      let html = `<div class="section"><div class="section-label">Financial Recovery</div>`;

      if (totalLost > 0) {
        const owed = Math.max(0, totalLost - totalPaid);
        html += `<div class="recovery-row">
          <div class="recovery-box">
            <div class="recovery-val">${sym}${Number(totalLost).toLocaleString()}</div>
            <div class="recovery-lbl">total tracked</div>
          </div>
          <div class="recovery-box">
            <div class="recovery-val green">${sym}${Number(totalPaid).toLocaleString()}</div>
            <div class="recovery-lbl">paid back</div>
          </div>
          <div class="recovery-box">
            <div class="recovery-val">${sym}${Number(owed).toLocaleString()}</div>
            <div class="recovery-lbl">still owed</div>
          </div>
        </div>`;
        if (recoveryPct !== null) {
          html += `<div class="progress-bar-track"><div class="progress-bar-fill" style="width:${recoveryPct}%"></div></div>
          <div class="progress-label">${recoveryPct}% of debt paid back</div>`;
        }
      } else {
        html += `<div class="clean-start">
          <div class="clean-start-emoji">🎉</div>
          <div>
            <div class="clean-start-text">No gambling debt tracked</div>
            <div class="clean-start-sub">They're starting clean — no debt to pay back.</div>
          </div>
        </div>`;
      }

      if (moneySaved > 0) {
        html += `<div class="savings-highlight">
          <div class="savings-emoji">💰</div>
          <div>
            <div class="savings-text">~${sym}${Number(moneySaved).toLocaleString()} saved by not gambling</div>
            <div class="savings-sub">Estimated based on their usual weekly spend</div>
          </div>
        </div>`;
      }

      html += `</div>`;
      return html;
    }

    async function send() {
      const ta = document.getElementById('msg');
      const btn = document.getElementById('btn');
      const msg = ta.value.trim().slice(0, 200);
      if (!msg) return;
      btn.disabled = true; btn.textContent = 'Sending…';
      try {
        const r = await fetch(API + '?t=' + encodeURIComponent(token), {
          method: 'POST', headers: {...AUTH, 'Content-Type':'application/json'}, body: JSON.stringify({message: msg})
        });
        if (r.ok) {
          document.getElementById('form-area').outerHTML =
            '<div class="sent"><div class="sent-title">&#x1F499; Sent!</div><div class="sent-sub">They\'ll see your message next time they open CornerDay.</div></div>';
        } else { btn.disabled = false; btn.textContent = 'Send 💙'; alert('Something went wrong.'); }
      } catch { btn.disabled = false; btn.textContent = 'Send 💙'; alert('Could not send. Check your connection.'); }
    }

    async function subscribe() {
      const inp = document.getElementById('notify-email');
      const btn = document.getElementById('notify-btn');
      const err = document.getElementById('notify-err');
      const email = inp.value.trim().toLowerCase();
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        err.textContent = 'Please enter a valid email address.'; return;
      }
      err.textContent = '';
      btn.disabled = true; btn.textContent = 'Saving…';
      try {
        const r = await fetch(API + '?t=' + encodeURIComponent(token), {
          method: 'POST', headers: {...AUTH, 'Content-Type':'application/json'}, body: JSON.stringify({email})
        });
        if (r.ok) {
          document.getElementById('notify-section').innerHTML =
            '<div class="notify-subscribed">✅ You\'re subscribed to notifications</div>' +
            '<div class="notify-update" onclick="showNotifyForm()">Update email address</div>';
        } else {
          btn.disabled = false; btn.textContent = 'Subscribe';
          err.textContent = 'Something went wrong. Please try again.';
        }
      } catch {
        btn.disabled = false; btn.textContent = 'Subscribe';
        err.textContent = 'Could not save. Check your connection.';
      }
    }

    function showNotifyForm() {
      document.getElementById('notify-section').innerHTML = notifyFormHtml(false);
    }

    function notifyFormHtml(subscribed) {
      if (subscribed) {
        return '<div class="notify-subscribed">✅ You\'re subscribed to notifications</div>' +
               '<div class="notify-update" onclick="showNotifyForm()">Update email address</div>';
      }
      return '<div class="notify-title">Get notified by email</div>' +
             '<div class="notify-sub">Receive an email when they\'re struggling, hit a milestone, or reset their streak — based on what they\'ve chosen to share.</div>' +
             '<input id="notify-email" class="notify-input" type="email" placeholder="your@email.com" />' +
             '<div id="notify-err" class="notify-err"></div>' +
             '<button id="notify-btn" class="notify-btn" onclick="subscribe()">Subscribe</button>';
    }

    (async () => {
      if (!token) {
        card.innerHTML =
          '<div class="streak-box" style="margin-bottom:24px">' +
            '<div style="font-size:40px;margin-bottom:12px">💙</div>' +
            '<div class="streak-unit">Supporter Portal</div>' +
            '<div class="streak-sub">Personal access only</div>' +
          '</div>' +
          '<h2>This page is shared from the app</h2>' +
          '<p>The Supporter Portal is a private page generated for someone supporting a person on their recovery journey. It can only be accessed via a personal link shared directly from the CornerDay app.</p>' +
          '<p style="margin-bottom:0">If someone has shared their progress with you, use the link they sent — it looks like <strong>cornerday.app/partner?t=…</strong></p>';
        return;
      }
      try {
        const r = await fetch(API + '?t=' + encodeURIComponent(token), { headers: AUTH });
        if (r.status === 404) { card.innerHTML = '<div class="logo">CornerDay</div><div class="error">This link is invalid or has been revoked.</div>'; return; }
        if (r.status === 410) { card.innerHTML = '<div class="logo">CornerDay</div><div class="error">This link has expired. Ask them to generate a new one in the app.</div>'; return; }
        const data = await r.json();
        const {
          streakMs, displayName: n,
          moodAvg, moodCheckins,
          milestonesEarned, latestMilestoneLabel, urgesResisted,
          recoveryPct, totalLost, totalPaid, moneySaved, currency,
          notifyEnabled, hasSubscriberEmail,
        } = data;
        const fmt = formatStreak(streakMs || 0);
        const name = n || 'someone you care about';
        const streakLabel = fmt.primary + ' ' + fmt.unit + (fmt.detail ? ' ' + fmt.detail : '');

        let extraSections = '';
        if (moodAvg !== undefined) extraSections += buildMoodSection(moodAvg, moodCheckins ?? 0);
        if (milestonesEarned !== undefined) extraSections += buildMilestonesSection(milestonesEarned, latestMilestoneLabel ?? null, urgesResisted);
        if (recoveryPct !== undefined || totalLost !== undefined || moneySaved !== undefined) {
          extraSections += buildRecoverySection(
            recoveryPct ?? null,
            totalLost ?? 0,
            totalPaid ?? 0,
            moneySaved ?? 0,
            currency ?? 'USD'
          );
        }

        const notifyHtml = notifyEnabled
          ? '<div class="notify-section" id="notify-section">' + notifyFormHtml(!!hasSubscriberEmail) + '</div>'
          : '';

        card.innerHTML =
          '<div class="private-banner">🔒 This link was shared with you personally. Please don\'t forward it — anyone with the URL can view this page.</div>' +
          '<div class="streak-box">' +
            '<div class="streak-row">' +
              '<div class="streak-num">' + esc(fmt.primary) + '</div>' +
              '<div class="streak-unit">' + esc(fmt.unit) + '</div>' +
              (fmt.detail ? '<div class="streak-detail">' + esc(fmt.detail) + '</div>' : '') +
            '</div>' +
            '<div class="streak-sub">clean &#x1F389;</div>' +
          '</div>' +
          '<h2>' + esc(name) + ' is on a ' + esc(streakLabel) + ' streak</h2>' +
          '<p>' + esc(name) + ' is working hard on their recovery. Send them a short message of support &mdash; it\'ll appear in the app next time they open it.</p>' +
          extraSections +
          notifyHtml +
          '<div class="divider"></div>' +
          '<div id="form-area">' +
            '<div class="encourage-header">' +
              '<div class="encourage-icon">💙</div>' +
              '<div>' +
                '<div class="encourage-title">Send a message</div>' +
                '<div class="encourage-sub">Shows up in their app — a reminder someone\'s cheering them on.</div>' +
              '</div>' +
            '</div>' +
            '<textarea id="msg" rows="4" maxlength="200" placeholder="Write something kind… (max 200 characters)"></textarea>' +
            '<button id="btn" onclick="send()">Send &#x1F499;</button>' +
          '</div>';
      } catch { card.innerHTML = '<div class="logo">CornerDay</div><div class="error">Could not load. Please try again.</div>'; }
    })();
  </script>
</body>
</html>
